<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amazon Clone - JR Intern Project</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="top-bar">
    <a class="logo" href="#home" aria-label="Go to homepage">amazon<span>clone</span></a>

    <button class="menu-btn" id="menuBtn" aria-label="Toggle menu">Menu</button>

    <div class="nav-middle" id="navMiddle">
      <div class="search-wrap">
        <input id="searchInput" type="text" placeholder="Search Amazon Clone products" />
        <button id="searchBtn">Search</button>
      </div>

      <div class="controls-row">
        <select id="categoryFilter">
          <option value="all">All categories</option>
        </select>

        <select id="sortSelect">
          <option value="default">Sort: Featured</option>
          <option value="price-low">Price: Low to High</option>
          <option value="price-high">Price: High to Low</option>
          <option value="rating-high">Rating: High to Low</option>
        </select>
      </div>
    </div>

    <div class="nav-right">
      <div class="account">
        <p>Hello, Storm</p>
        <strong>Account & Lists</strong>
      </div>

      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">Theme</button>

      <button class="cart-btn" id="cartBtn" aria-label="Open cart">
        Cart
        <span id="cartCount" class="cart-count">0</span>
      </button>
    </div>
  </header>

  <main id="home">
    <section class="hero">
      <div class="hero-text">
        <button id="shopNowBtn">Shop now</button>
      </div>
    </section>

    <section class="categories">
      <h2>Shop by Category</h2>
      <div class="category-grid" id="categoryGrid"></div>
    </section>

    <section class="products">
      <div class="products-header">
        <h2>Featured Products</h2>
        <p id="resultsText"></p>
      </div>
      <div class="product-grid" id="productGrid"></div>
    </section>
  </main>

  <aside class="cart-panel" id="cartPanel" aria-label="Shopping cart">
    <div class="cart-header">
      <h3>Your Cart</h3>
      <button id="closeCartBtn" aria-label="Close cart">X</button>
    </div>

    <div id="cartItems" class="cart-items"></div>

    <div class="cart-footer">
      <p>Subtotal: <strong id="subtotal">$0.00</strong></p>
      <button id="clearCartBtn" class="danger-btn">Clear Cart</button>
      <button class="checkout-btn">Proceed to Checkout</button>
    </div>
  </aside>

  <div class="overlay" id="overlay"></div>

  <script src="script.js"></script>
</body>
</html>
